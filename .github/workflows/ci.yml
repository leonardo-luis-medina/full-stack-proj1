name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PUSHER_APP_ID: "placeholder"
          PUSHER_KEY: "placeholder"
          PUSHER_SECRET: "placeholder"
          PUSHER_CLUSTER: "ap1"
          NEXT_PUBLIC_PUSHER_KEY: "placeholder"
          NEXT_PUBLIC_PUSHER_CLUSTER: "ap1"
          CLOUDFLARE_R2_ACCOUNT_ID: "placeholder"
          CLOUDFLARE_R2_ACCESS_KEY_ID: "placeholder"
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: "placeholder"
          CLOUDFLARE_R2_BUCKET_NAME: "placeholder"
          CLOUDFLARE_R2_PUBLIC_URL: "placeholder"
